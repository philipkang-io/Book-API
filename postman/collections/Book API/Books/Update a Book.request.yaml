schemaVersion: "3.0"
type: http
url: "{{baseUrl}}/api/v1/books/{{bookId}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "title": "Dune Messiah",
      "author": "Frank Herbert",
      "year": 1969
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });
      pm.test('Book is updated', function () {
          const json = pm.response.json();
          pm.expect(json.book.title).to.eql('Dune Messiah');
          pm.expect(json.book.year).to.eql(1969);
      });
    language: text/javascript
order: 4000
