schemaVersion: "3.0"
url: '{{baseUrl}}/api/v1/books'
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: text
  content: |-
    {
      "title": "Dune",
      "author": "Frank Herbert",
      "year": 1965
    }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "name": "string",
          "message": "string"
        }
      }
order: 2000
