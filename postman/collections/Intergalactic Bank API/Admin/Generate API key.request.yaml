method: GET
order: 1000
scripts:
  - code: |-
      // Parse the JSON response
      const jsonData = pm.response.json();

      // Test to verify the API key was received successfully
      pm.test('API key was received successfully', function() {
          pm.expect(jsonData).to.have.property('apiKey');
          pm.expect(jsonData.apiKey).to.be.a('string');
          pm.expect(jsonData.apiKey).to.not.be.empty;
      });

      // Extract the apiKey and save it to the environment variable
      if (jsonData.apiKey) {
          pm.environment.set('apiKey', jsonData.apiKey);
          console.log('API key saved to environment variable: apiKey');
      }
    language: text/javascript
    type: afterResponse
type: http
url: http://localhost:3000/api/v1/auth
