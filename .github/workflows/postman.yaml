name: Publish to Postman Workspace

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  postman:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: curl -o- "https://dl-cli.pstmn.io/install/unix.sh" | sh

      - name: Validate Collection and Spec
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: |
          postman login --with-api-key "$POSTMAN_API_KEY"
          postman collection run ./postman/collections/Intergalactic-Bank-API
          postman workspace prepare
          postman workspace push -y
