name: Publish to Postman Workspace

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  postman:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: curl -o- "https://dl-cli.pstmn.io/install/unix.sh" | sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Start server in background
        run: |
          npm run dev &
          echo $! > pidfile
          # Wait for server to be ready (port 3000)
          for i in {1..20}; do
            if nc -z localhost 3000; then
              echo "Server is up!"
              break
            fi
            echo "Waiting for server..."
            sleep 2
          done

      - name: Validate Collection and Push to Cloud
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: |
          postman login --with-api-key "$POSTMAN_API_KEY"
          postman collection run ./postman/collections/Book-API
          postman workspace prepare
          postman workspace push -y

      - name: Stop server
        if: always()
        run: |
          if [ -f pidfile ]; then
            kill $(cat pidfile) || true
            rm pidfile
          fi
